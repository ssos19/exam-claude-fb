services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: football
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      target: builder
    command: ["node", "scripts/migrate.js"]
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: football
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: football
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  mysql_data:
