services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: football
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # "-h 127.0.0.1"로 강제로 TCP를 통해 ping한다. "-h localhost"를 쓰면
      # mysqladmin이 유닉스 소켓으로 붙는데, MySQL 공식 이미지는 최초 실행 시
      # (볼륨이 비어있을 때) init 스크립트만 실행하는 임시 서버를
      # --skip-networking(TCP 없이, 소켓만)으로 잠깐 띄웠다가 완전히 재시작한다.
      # 이때 소켓 기준 healthcheck는 그 "임시 서버" 단계에서부터 healthy로
      # 잘못 판정해버려서, migrate 컨테이너가 TCP(mysql:3306)로 접속을
      # 시도하는 시점에 아직 포트가 열리지 않아 연결이 거부될 수 있다.
      # TCP로 직접 ping하면 실제 서비스 가능한 시점과 healthcheck가 일치한다.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  migrate:
    build:
      context: .
      target: builder
    command: ["node", "scripts/migrate.js"]
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: football
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: football
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully

  # 선택적(opt-in) 개발 모드 서비스. profiles에 걸려 있어서 일반
  # "docker compose up" / "docker compose up --build"로는 절대 뜨지 않는다
  # (기존 프로덕션 흐름을 그대로 보존하기 위함). 켜고 싶을 때만 명시적으로:
  #   docker compose up -d mysql
  #   docker compose run --rm migrate      # 최초 1회, 스키마 적용
  #   docker compose --profile dev up app-dev
  # 로 실행한다. "app"(프로덕션)과 "app-dev"는 둘 다 호스트 3000번
  # 포트를 쓰므로 동시에 띄우지 않는다.
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      target: deps # node_modules만 있으면 되고, 소스는 아래 volumes로 마운트한다.
    working_dir: /app
    command: ["node_modules/.bin/next", "dev", "-H", "0.0.0.0", "-p", "3000"]
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: football
      NODE_ENV: development
    volumes:
      # 호스트(Windows)의 소스 코드를 컨테이너에 그대로 마운트 → 코드 수정이
      # 즉시 반영되어 핫리로드가 동작한다.
      - .:/app
      # 위 바인드 마운트가 컨테이너 안의 node_modules(리눅스용으로 빌드됨)를
      # 덮어써버리는 걸 막기 위한 익명 볼륨. 이게 없으면 호스트에 node_modules가
      # 없을 땐 컨테이너 안 것까지 사라지고, 있을 땐(Windows에서 yarn install한
      # 것) OS가 달라 네이티브 모듈 문제가 생길 수 있다.
      - /app/node_modules
      - /app/.next
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
